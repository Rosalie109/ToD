<div class="tod_extension_settings">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>🎲 真心话大冒险 (TOD) 题库设置</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <p>每行一道题。保存后立即生效。游戏按钮在聊天框底部的发送按钮旁。</p>
            
            <label for="tod_truth_pool"><b>💬 真心话题库</b></label>
            <textarea id="tod_truth_pool" rows="8" class="text_pole" style="width: 100%; margin-bottom: 10px;"></textarea>
            
            <label for="tod_dare_pool"><b>🔥 大冒险题库</b></label>
            <textarea id="tod_dare_pool" rows="8" class="text_pole" style="width: 100%; margin-bottom: 10px;"></textarea>
            
            <button id="tod_save_btn" class="menu_button">💾 保存题库</button>
            <button id="tod_reset_btn" class="menu_button">🔄 恢复默认题库</button>
        </div>
    </div>
</div>
